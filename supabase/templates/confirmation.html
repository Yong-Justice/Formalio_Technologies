<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Verify your Formalio account</title>
  </head>
  <body style="margin:0;background:#f4f7f6;font-family:Inter,Arial,sans-serif;color:#10201d;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f7f6;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #dce7e3;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 12px;">
                <div style="font-size:18px;font-weight:800;color:#065f46;">Formalio</div>
                <h1 style="margin:22px 0 8px;font-size:24px;line-height:1.25;color:#10201d;">Verify your account</h1>
                <p style="margin:0;color:#53635f;font-size:15px;line-height:1.6;">Enter this secure code in the Formalio app to finish creating your account.</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:10px 28px 18px;">
                <div style="letter-spacing:8px;font-size:34px;font-weight:900;color:#064e3b;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:16px;padding:18px 20px;">{{ .Token }}</div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 28px 28px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#047857;color:#ffffff;text-decoration:none;font-weight:800;border-radius:14px;padding:14px 18px;">Verify with secure link</a>
                <p style="margin:18px 0 0;color:#6b7b76;font-size:13px;line-height:1.5;">If you did not request this account, you can safely ignore this email. Never share this code with anyone.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
