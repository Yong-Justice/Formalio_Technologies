<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign in to Formalio</title>
  </head>
  <body style="margin:0;background:#f4f7f6;font-family:Inter,Arial,sans-serif;color:#10201d;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f7f6;padding:28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#ffffff;border:1px solid #dce7e3;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:28px;">
                <div style="font-size:18px;font-weight:800;color:#065f46;">Formalio</div>
                <h1 style="margin:22px 0 8px;font-size:24px;line-height:1.25;color:#10201d;">Sign in securely</h1>
                <p style="margin:0 0 18px;color:#53635f;font-size:15px;line-height:1.6;">Use this one-time code or open the secure link to access your account.</p>
                <div style="letter-spacing:8px;font-size:34px;font-weight:900;color:#064e3b;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:16px;padding:18px 20px;text-align:center;">{{ .Token }}</div>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;margin-top:20px;background:#047857;color:#ffffff;text-decoration:none;font-weight:800;border-radius:14px;padding:14px 18px;">Open Formalio</a>
                <p style="margin:18px 0 0;color:#6b7b76;font-size:13px;line-height:1.5;">This link and code expire automatically. Do not share them.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
